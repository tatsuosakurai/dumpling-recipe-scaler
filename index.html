<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>蔓餃苑 餃子分量計算</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2288%22>🥟</text></svg>">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="calculator" aria-label="餃子の分量計算">
        <div class="dumpling-mark" aria-hidden="true">🥟</div>
        <form class="controls" id="recipe-form">
          <div class="quantity-row">
            <input id="quantity" name="quantity" type="number" inputmode="numeric" min="1" step="1" value="160" aria-label="作る個数">
            <span>個</span>
          </div>
          <div class="quick-actions" aria-label="個数の候補">
            <button type="button" data-quantity="30">30</button>
            <button type="button" data-quantity="60">60</button>
            <button type="button" data-quantity="120">120</button>
            <button type="button" data-quantity="160">160</button>
          </div>
        </form>
      </section>

      <section class="recipe-grid" id="recipe-results" aria-live="polite"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
